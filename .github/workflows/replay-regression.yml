name: Replay Regression

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  replay-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Variant Data Packs
        run: pnpm run generate:data

      - name: Typecheck + Lint/Format Gate
        run: pnpm run check

      - name: Deterministic Replay Regression
        run: pnpm run test:replay
