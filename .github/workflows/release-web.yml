name: Release Web

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (for example: v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Variant Data Packs
        run: pnpm run generate:data

      - name: Typecheck + Lint/Format Gate
        run: pnpm run check

      - name: Replay Regression Gate
        run: pnpm run test:replay

      - name: Build Production Web Bundle
        run: pnpm run build:prod

      - name: Package Release Artifact
        run: |
          ARCHIVE_NAME="web-dist-${RELEASE_TAG}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C apps/web dist
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: ${{ env.ARCHIVE_NAME }}
